name: Nightly Bedrock server build

on:
  schedule:
    # 08:00 UTC = 3:00am Central (CDT). Drifts to 2:00am during CST (winter).
    - cron: '0 8 * * *'
  workflow_dispatch: {}

env:
  IMAGE_NAME: fingerhutascode/minecraft-bedrock-server

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.latest.outputs.version }}
      needs_build: ${{ steps.compare.outputs.needs_build }}
    steps:
      - name: Get latest Bedrock server version
        id: latest
        run: |
          json=$(curl -fsSL https://raw.githubusercontent.com/kittizz/bedrock-server-downloads/main/bedrock-server-downloads.json)
          version=$(echo "$json" | jq -r '.release | keys[]' | sort -V | tail -1)
          echo "Latest upstream version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if version is already published
        id: compare
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://hub.docker.com/v2/repositories/${IMAGE_NAME}/tags/${{ steps.latest.outputs.version }}")
          if [ "$status" = "200" ]; then
            echo "Tag ${{ steps.latest.outputs.version }} already exists on Docker Hub, nothing to do."
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${{ steps.latest.outputs.version }} not found on Docker Hub, will build."
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: check-version
    if: needs.check-version.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

  update-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push README to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "Auto-updating Minecraft Bedrock server with drop-in .mcworld mod support"
          readme-filepath: ./README.md
